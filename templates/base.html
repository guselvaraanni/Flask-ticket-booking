<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}TicketFlow{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2">
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="site-header">
    <div class="container header-bar">
      <a href="{{ url_for('pages.home') }}" class="logo">
        <span class="logo-mark">TF</span>
        <span class="logo-text">TicketFlow</span>
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Open menu" aria-expanded="false" aria-controls="mainNav">
        <span></span><span></span><span></span>
      </button>
      <nav class="main-nav" id="mainNav" aria-label="Main navigation">
        <a href="{{ url_for('pages.home') }}" class="nav-link{% if request.endpoint == 'pages.home' %} active{% endif %}">Home</a>
        <a href="{{ url_for('pages.events_page') }}" class="nav-link{% if request.endpoint == 'pages.events_page' %} active{% endif %}">Events</a>
        <a href="{{ url_for('pages.stats_page') }}" class="nav-link{% if request.endpoint in ('pages.stats_page', 'pages.stats_event_page') %} active{% endif %}">Statistics</a>
        <a href="{{ url_for('pages.cancel_page') }}" class="nav-link{% if request.endpoint == 'pages.cancel_page' %} active{% endif %}">Cancel Booking</a>
      </nav>
    </div>
  </header>

  <div id="toastContainer" class="toast-container" role="status" aria-live="polite"></div>
  <div id="globalLoading" class="global-loading hidden" aria-hidden="true">
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <strong>TicketFlow</strong>
        <p>Concurrency-safe ticketing with Flask, MySQL, and row-level locking.</p>
      </div>
      <div class="footer-links">
        <a href="{{ url_for('pages.concurrency_demo_page') }}">How it works</a>
      </div>
      <div class="footer-status">
        <span id="healthStatus" class="health-badge">Checking API...</span>
      </div>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
